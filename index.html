<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lúpula — conselheira de pilsner</title>
<style>
  :root{
    --bg:#0b0a10; --ink:#ece5d3; --dim:#8b8578; --gold:#e6b34a;
    --ember:#ff9e63; --panel:rgba(16,14,22,.72);
  }
  html,body{margin:0;height:100%;background:var(--bg);overflow:hidden;
    font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace;color:var(--ink)}
  canvas{display:block;width:100vw;height:100vh}
  /* ---------- topo ---------- */
  #hud{position:fixed;top:18px;left:22px;display:flex;flex-direction:column;gap:6px;
    pointer-events:none;user-select:none}
  #hud .name{font-size:13px;letter-spacing:.34em;color:var(--gold)}
  #hud .mood{font-size:11px;letter-spacing:.18em;color:var(--dim);text-transform:uppercase;
    transition:color .6s}
  #mugs{display:flex;gap:5px;margin-top:4px;align-items:flex-end;height:20px}
  .mug{width:13px;height:16px;border:1px solid var(--dim);border-radius:1px 1px 3px 3px;
    position:relative;opacity:.35;transition:all .5s}
  .mug::after{content:'';position:absolute;right:-5px;top:3px;width:4px;height:7px;
    border:1px solid var(--dim);border-left:none;border-radius:0 3px 3px 0}
  .mug.full{opacity:1;border-color:var(--gold);
    background:linear-gradient(to top,var(--gold) 78%,var(--ink) 78%)}
  .mug.full::after{border-color:var(--gold)}
  /* ---------- fala ---------- */
  #speech{position:fixed;right:26px;top:12vh;width:min(340px,38vw);
    max-height:62vh;overflow-y:auto;display:flex;flex-direction:column;gap:14px;
    scrollbar-width:none;-webkit-mask-image:linear-gradient(to bottom,transparent,#000 24px,#000 calc(100% - 8px),transparent)}
  #speech::-webkit-scrollbar{display:none}
  .msg-u{align-self:flex-end;font-size:11.5px;color:var(--dim);max-width:88%;
    text-align:right;letter-spacing:.02em;line-height:1.5}
  .msg-a{font-family:Georgia,'Iowan Old Style','Times New Roman',serif;
    font-size:17px;line-height:1.62;color:var(--ink);max-width:100%;
    text-shadow:0 0 22px rgba(0,0,0,.9)}
  .msg-a em{color:var(--gold);font-style:normal}
  .msg-sys{font-size:10.5px;letter-spacing:.22em;color:var(--gold);opacity:.85;
    text-transform:uppercase}
  /* ---------- input ---------- */
  #bar{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);
    display:flex;gap:8px;align-items:center;width:min(680px,92vw);
    flex-wrap:wrap;justify-content:center}
  #inp{flex:1;min-width:220px;background:var(--panel);border:1px solid rgba(236,229,211,.16);
    border-radius:999px;padding:13px 20px;color:var(--ink);font:14px Georgia,serif;
    outline:none;backdrop-filter:blur(8px);transition:border-color .3s}
  #inp:focus{border-color:rgba(230,179,74,.55)}
  #inp::placeholder{color:var(--dim);font-style:italic}
  button{cursor:pointer;border:1px solid rgba(236,229,211,.16);background:var(--panel);
    color:var(--ink);border-radius:999px;backdrop-filter:blur(8px);
    font:12px ui-monospace,monospace;letter-spacing:.08em;transition:all .25s}
  button:hover{border-color:var(--gold);color:var(--gold)}
  #send{padding:13px 18px}
  #brinde{padding:13px 15px}
  button:disabled{opacity:.35;cursor:default}
  #caption{position:fixed;left:0;top:0;font:italic 15px Georgia,serif;color:var(--gold);
    pointer-events:none;opacity:0;transition:opacity .4s;text-shadow:0 0 14px #000}
  #printHead{display:none}
  @media print{
    html,body{background:#fff;color:#111;overflow:visible;height:auto}
    canvas,#hud,#bar,#caption{display:none!important}
    #printHead{display:block;font-family:Georgia,serif;color:#111;
      border-bottom:2px solid #c9a227;padding-bottom:10px;margin-bottom:18px}
    #printHead h1{font-size:22px;margin:0 0 4px;letter-spacing:.04em}
    #printMeta{font:11px ui-monospace,monospace;color:#8a6d1a;letter-spacing:.12em}
    #speech{position:static;width:auto;max-height:none;overflow:visible;
      -webkit-mask-image:none;mask-image:none;display:block}
    #speech > div{margin:0 0 12px;break-inside:avoid}
    .msg-u{color:#666;text-align:right;font-size:11px}
    .msg-a{color:#111;text-shadow:none;font-size:13.5px;line-height:1.55}
    .msg-sys{color:#a67c1e;font-size:9.5px}
  }
  @media (max-width:760px){
    #speech{right:12px;left:12px;width:auto;top:auto;bottom:110px;max-height:34vh}
    .msg-a{font-size:15px}
  }
</style>
</head>
<body>
<canvas id="cv"></canvas>

<div id="hud">
  <div class="name">L Ú P U L A</div>
  <div class="mood" id="mood">sóbria · analítica</div>
  <div id="mugs"></div>
</div>

<div id="speech"></div>
<div id="caption">*glup*</div>

<div id="bar">
  <input id="inp" type="text" maxlength="400"
    placeholder="conta uma ideia sua pra ela..." autocomplete="off">
  <button id="send" type="button">enviar</button>
  <button id="brinde" type="button" title="oferecer mais uma pilsner">🍺+1</button>
  <button id="cafe" type="button" title="café — devolve 2 copos de sobriedade">☕</button>
  <button id="voz" type="button" title="alternar: voz de pontos / voz falada / mudo">🔉 pontos</button>
  <button id="pdf" type="button" title="salvar a conversa em PDF">⎙ pdf</button>
</div>

<div id="printHead">
  <h1>Lúpula — ata da conversa</h1>
  <div id="printMeta"></div>
</div>

function resize(){
  const dpr = devicePixelRatio || 1;
  W = innerWidth; H = innerHeight;
  cv.width = W*dpr; cv.height = H*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);

}

/* ---------- utilidades ---------- */
const gauss = (x,y,cx,cy,sx,sy) => {
  const dx=(x-cx)/sx, dy=(y-cy)/sy;
  return Math.exp(-(dx*dx+dy*dy)/2);
};
const smooth = k => k*k*(3-2*k);
const clamp = (v,a,b) => v<a?a:v>b?b:v;

/* ---------- amostragem de um retrato ---------- */
function samplePortrait(img, A){
  const s = document.createElement('canvas');
  s.width = SW; s.height = SH;
  const sc = s.getContext('2d');
  sc.drawImage(img, 0, 0, SW, SH);
  const data = sc.getImageData(0,0,SW,SH).data;
  const lumAt = (x,y) => {
    const i = ((clamp(y,0,SH-1)|0)*SW + (clamp(x,0,SW-1)|0))*4;
    return (data[i]*0.299 + data[i+1]*0.587 + data[i+2]*0.114)/255;
  };
  const g = A.sig;
  const out = [];
  let tent = 0;
  /* rosto */
  while (out.length < FACE_N && tent++ < FACE_N*90){
    let x = Math.random()*SW, y = Math.random()*SH;
    const lum0 = lumAt(x,y);
    if (lum0 < 0.085) continue;
    const lum = (lum0 - A.floor)/(1 - A.floor);
    if (lum <= 0) continue;
    const edge = Math.min(x, y, SW-x, SH-y);
    const feather = clamp(edge/48, 0, 1);
    /* boost gaussiano nos olhos */
    const eb = gauss(x,y,A.eyeL[0],A.eyeL[1],26*g,18*g)
             + gauss(x,y,A.eyeR[0],A.eyeR[1],26*g,18*g);
    const dens = clamp(lum,0,1)*feather*(1+1.15*eb);
    if (Math.random() >= Math.pow(clamp(dens,0,1), A.gamma)) continue;
    /* lente: afasta pontos do centro dos olhos (~olhos maiores) */
    for (const E of [A.eyeL, A.eyeR]){
      const dx = x-E[0], dy = y-E[1], d = Math.hypot(dx,dy), R = 46*g;
      if (d>0.5 && d<R){ const f = 1 + 0.16*(1-d/R); x = E[0]+dx*f; y = E[1]+dy*f; }
    }
    out.push(mkPoint(x, y, clamp(lum,0,1), A, false));
  }
  /* halo externo — a figura evapora */
  const HM = 150, HSIG = 55;
  tent = 0;
  while (out.length < N && tent++ < HALO_N*400){
    const x = -HM + Math.random()*(SW+2*HM);
    const y = -HM + Math.random()*(SH+2*HM);
    const dx = Math.max(-x, 0, x-SW), dy = Math.max(-y, 0, y-SH);
    const d = Math.hypot(dx,dy);
    if (d <= 0.5) continue;
    const lumE = lumAt(clamp(x,2,SW-2), clamp(y,2,SH-2));
    const pr = lumE * Math.exp(-d/HSIG);
    if (Math.random() >= pr) continue;
    const p = mkPoint(x, y, lumE, A, true);
    p.a *= clamp(pr*1.6, .15, .8);
    out.push(p);
  }
  while (out.length < N){ // garantia de contagem (regra de ouro da metamorfose)
    const b = out[(Math.random()*out.length)|0];
    out.push({...b, x:b.x+(Math.random()-0.5)*6, y:b.y+(Math.random()-0.5)*6});
  }
  /* ordena por varredura angular — a metamorfose vira um redemoinho suave */
  const fc = A.faceC;
  out.sort((p,q)=>{
    const ka = Math.round(Math.atan2(p.y-fc[1], p.x-fc[0])*5);
    const kb = Math.round(Math.atan2(q.y-fc[1], q.x-fc[0])*5);
    return ka-kb || Math.hypot(p.x-fc[0],p.y-fc[1]) - Math.hypot(q.x-fc[0],q.y-fc[1]);
  });
  return out;
}

function mkPoint(x, y, lum, A, halo){
  const g = A.sig;
  const w = halo ? {ir:0,eye:0,br:0,mcL:0,mcR:0,mo:0,moLow:0,jaw:0,chL:0,chR:0,turn:0,head:0} : {
    ir:  gauss(x,y,A.eyeL[0],A.eyeL[1],17*g,14*g)+gauss(x,y,A.eyeR[0],A.eyeR[1],17*g,14*g),
    eye: gauss(x,y,A.eyeL[0],A.eyeL[1],34*g,20*g)+gauss(x,y,A.eyeR[0],A.eyeR[1],34*g,20*g),
    br:  gauss(x,y,A.browL[0],A.browL[1],40*g,11*g)+gauss(x,y,A.browR[0],A.browR[1],40*g,11*g),
    mcL: gauss(x,y,A.mouthL[0],A.mouthL[1],17*g,15*g),
    mcR: gauss(x,y,A.mouthR[0],A.mouthR[1],17*g,15*g),
    mo:  gauss(x,y,A.mouthC[0],A.mouthC[1],46*g,26*g),
    chL: gauss(x,y,A.cheekL[0],A.cheekL[1],28*g,36*g),
    chR: gauss(x,y,A.cheekR[0],A.cheekR[1],28*g,36*g),
    turn:gauss(x,y,A.faceC[0],A.faceC[1],88*g,175*g),
    head:gauss(x,y,A.faceC[0],A.faceC[1]+20,215*g,290*g)
  };
  if (!halo){
    w.moLow = w.mo * (y > A.mouthC[1] ? 1 : 0.15);
    w.jaw = gauss(x,y,A.mouthC[0],A.mouthC[1]+70*g,55*g,42*g);
  }
  return {
    x, y,
    r: (0.5 + lum*0.8 + Math.random()*0.28) * A.dotR,
    a: 0.34 + lum*0.6,
    ph1: Math.random()*6.283, ph2: Math.random()*6.283, ph3: Math.random()*6.283,
    f1: 0.3+Math.random()*1.0, f2: 0.3+Math.random()*0.9, f3: 0.35+Math.random()*1.15,
    amp: 0.3+Math.random()*0.5,
    ox:0, oy:0, heat:0, dr: Math.random(),
    i0x: Math.random(), i0y: Math.random(), d0: Math.random()*0.9,
    sw: 0.6+Math.random()*0.8,          // fator individual do redemoinho
    w
  };
}

/* ---------- áudio (blueprint §12): pentatônica + delay de sala ---------- */
let AC = null, master = null, delayIn = null;
function ensureAudio(){
  if (AC){ if (AC.state === 'suspended') AC.resume(); return; }
  try{
    AC = new (window.AudioContext || window.webkitAudioContext)();
    master = AC.createGain(); master.gain.value = 0.9;
    master.connect(AC.destination);
    delayIn = AC.createGain();
    const d = AC.createDelay(1); d.delayTime.value = 0.32;
    const fb = AC.createGain(); fb.gain.value = 0.28;
    const wet = AC.createGain(); wet.gain.value = 0.3;
    delayIn.connect(d); d.connect(fb); fb.connect(d);
    d.connect(wet); wet.connect(master);
  }catch(e){}
}
addEventListener('pointerdown', ensureAudio, {once:false});
addEventListener('keydown', ensureAudio, {once:false});

/* escala pentatônica menor (sempre soa bem, nunca vira melodia) */
const PENTA = [0,3,5,7,10,12,15,17,19,22,24];
let lastNote = 0, noteGap = 0.12;
function note(f, t, dur, type, vol){
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.value = f;
  const L = lvl(copos);
  if (L.warm > 0.4){                     // vibrato de bêbada
    const v = AC.createOscillator(), vg = AC.createGain();
    v.frequency.value = 4.5 + Math.random()*2;
    vg.gain.value = 3 + L.warm*6;
    v.connect(vg); vg.connect(o.frequency);
    v.start(t); v.stop(t + dur);
  }
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.015 + L.warm*0.05);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(master); g.connect(delayIn);
  o.start(t); o.stop(t + dur + 0.05);
}
function pluck(ny, vel){
  if (!AC || AC.state !== 'running') return;
  const t = AC.currentTime;
  if (t - lastNote < noteGap) return;
  lastNote = t;
  noteGap = 0.06 + Math.random()*0.16;
  const L = lvl(copos);
  /* grave embaixo, agudo em cima; ±1 grau de acaso */
  const idx = clamp(Math.round((1-ny)*(PENTA.length-1) + (Math.random()*2-1)), 0, PENTA.length-1);
  const f = 196 * Math.pow(2, PENTA[idx]/12);
  const dur = 0.35 + L.warm*1.9 + Math.random()*0.4;   // bêbada = notas escorridas
  const type = L.warm < 0.25 ? 'sine' : L.warm < 0.6 ? 'triangle' : 'sawtooth';
  const vol = clamp(0.02 + vel*0.0045, 0.02, 0.09) * (type === 'sawtooth' ? 0.45 : 1);
  note(f, t, dur, type, vol);
  const r = Math.random();
  if (r < 0.12 + L.warm*0.25) note(f*Math.pow(2,7/12), t+0.02, dur*0.8, type, vol*0.6);  // quinta
  else if (r < 0.22)          note(f*Math.pow(2,3/12), t+0.03, dur*0.7, type, vol*0.5);  // terça
}
function glup(){
  if(!AC || AC.state!=='running' && AC.resume) AC && AC.resume && AC.resume();
  if(!AC) return;
  const t = AC.currentTime;
  for(let i=0;i<3;i++){
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = 'sine';
    const f0 = 220 - i*40 + Math.random()*30;
    o.frequency.setValueAtTime(f0, t+i*0.16);
    o.frequency.exponentialRampToValueAtTime(f0*0.55, t+i*0.16+0.13);
    g.gain.setValueAtTime(0.0001, t+i*0.16);
    g.gain.exponentialRampToValueAtTime(0.12, t+i*0.16+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t+i*0.16+0.15);
    o.connect(g).connect(AC.destination);
    o.start(t+i*0.16); o.stop(t+i*0.16+0.2);
  }
}

/* ---------- ciclo do gole ---------- */
const caption = document.getElementById('caption');

}

/* ---------- motor de olhar (blueprint §8) ---------- */
function gazeStep(t, dt){
  if (t > gaze.until){
    const r = Math.random();
    let mode;
    if (gaze.mode !== 'center' && Math.random() < 0.65) mode = 'center';
    else mode = r < 0.62 ? 'center' : r < 0.83 ? 'glance' : 'away';
    gaze.mode = mode;
    if (mode === 'center'){
      gaze.tx = (Math.random()-0.5)*0.16; gaze.ty = (Math.random()-0.5)*0.14;
      gaze.until = t + 1.6 + Math.random()*2.8;
    } else if (mode === 'glance'){
      gaze.tx = (Math.random()<0.5?-1:1)*(0.25+Math.random()*0.35);
      gaze.ty = (Math.random()-0.5)*0.3;
      gaze.until = t + 0.5 + Math.random()*1.1;
    } else {
      gaze.tx = (Math.random()<0.5?-1:1)*(0.5+Math.random()*0.35);
      gaze.ty = 0.1+Math.random()*0.3;
      gaze.until = t + 1.3 + Math.random()*1.9;
    }
    if (Math.random() < 0.3) blinkStart = t;         // pisca ao desviar
  }
  if (thinking){ gaze.tx = 0.55; gaze.ty = 0.4; }     // pensativa: olha pro alto/lado
  if (t > gaze.sacc){                                  // microssacadas
    gaze.tx += (Math.random()-0.5)*0.12;
    gaze.sacc = t + 0.4 + Math.random();
  }
  const drunk = lvl(copos).sway;
  const kIn = 9 - drunk*4, kOut = 4.5 - drunk*2;      // bêbada = olhar mais lento
  const k = Math.abs(gaze.tx) > Math.abs(gaze.gx) ? kIn : kOut;
  gaze.gx += (gaze.tx - gaze.gx)*(1 - Math.exp(-dt*k));
  gaze.gy += (gaze.ty - gaze.gy)*(1 - Math.exp(-dt*Math.max(2,k)));
}

/* ---------- render ---------- */
const inkCool = [236,229,211], inkWarm = [255,196,150], emberC = [255,158,99];
let lastT = 0, introT0 = -1;

function start(){ requestAnimationFrame(frame); greet(); }

function frame(ms){
  const t = ms/1000;
  const dt = Math.min(0.05, t - lastT || 0.016); lastT = t;
  if (introT0 < 0) introT0 = t;
  intro = clamp((t - introT0)/3, 0, 1);
  scatter += (scatterTarget - scatter)*(1 - Math.exp(-dt*2.2));
  morph += (morphTarget - morph)*(1 - Math.exp(-dt*2.6));
  const m = clamp(morph, 0, 1), mE = smooth(m);

  gazeStep(t, dt);

  /* piscar */
  const L = lvl(copos);
  if (t - blinkStart > 0.4 && t > nextBlink){
    blinkStart = t;
    nextBlink = t + (2 + Math.random()*5)*L.blinkMul;
    if (Math.random()<0.14) nextBlink = t + 0.5;      // piscada dupla
  }
  let lid = 1 - Math.abs(2*(t - blinkStart)/0.32 - 1);
  lid = clamp(lid, 0, 1);
  lid = Math.max(lid, baseLid + Math.sin(t*0.7)*baseLid*0.4);

  /* embriaguez: balanço global */
  const sway = L.sway;
  const tilt = Math.sin(t*0.6)*0.35*sway + Math.sin(t*0.23)*0.3*sway;
  const bob  = Math.sin(t*0.9)*4*sway;
  heatWarm += (L.warm - heatWarm)*(1-Math.exp(-dt*0.8));

  /* fala */
  const talkEnv = talking * Math.max(0, Math.sin(t*11)*0.6 + Math.sin(t*23)*0.4);

  /* cor da tinta esquenta com a bebida */
  const ink = [0,1,2].map(i => Math.round(inkCool[i] + (inkWarm[i]-inkCool[i])*heatWarm*0.55));
  const baseFill = `rgb(${ink[0]},${ink[1]},${ink[2]})`;

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = baseFill;

  const useB = mE > 0.5;
  const AN = useB ? AN_B : AN_A;
  const exprK = Math.abs(1 - 2*mE);                    // expressões somem no meio da viagem
  const gx = gaze.gx, gy = gaze.gy;
  const drinkTilt = mE * -0.12;                        // cabeça levemente pra trás no gole

  for (let i=0;i<N;i++){
    const a = PA[i], b = PB[i];
    const p = useB ? b : a;

    /* posição-fonte: interpolação + redemoinho perpendicular */
    let sx = a.x + (b.x - a.x)*mE;
    let sy = a.y + (b.y - a.y)*mE;
    if (m > 0.002 && m < 0.998){
      const arc = Math.sin(mE*Math.PI) * 16 * p.sw;
      const dxm = b.x - a.x, dym = b.y - a.y, len = Math.hypot(dxm,dym)||1;
      sx += (-dym/len)*arc; sy += (dxm/len)*arc;
    }

    /* ondulação orgânica — cresce com a bebida */
    const ampl = p.amp * (1 + sway*0.55 + heatWarm*0.85);
    const wx = Math.sin(t*p.f1+p.ph1)*ampl + Math.sin(t*p.f2*1.7+p.ph2)*ampl*0.6;
    const wy = Math.cos(t*p.f2+p.ph3)*ampl + Math.sin(t*p.f3+p.ph1)*ampl*0.5;

    /* expressões (pesos do retrato ativo) */
    const w = p.w;
    let ex = 0, ey = 0;
    if (exprK > 0.02){
      ex += gx*7.5*w.ir;              ey += -gy*4.5*w.ir;
      ex += gx*(9*w.turn + 4*w.head); ey += -gy*5*w.head;
      ey += (AN.eyeY - sy)*lid*w.eye;
      ey += -((thinking?0.35:0) + heatWarm*0.15)*9*w.br;
      const sm = 0.12 + heatWarm*0.3 + talking*0.1;
      ex += sm*(-7*w.mcL + 7*w.mcR);
      ey += sm*(-6*(w.mcL+w.mcR) - 4*(w.chL+w.chR));
      ey += talkEnv*(7*w.moLow + 4*w.jaw);
      const tl = tilt + drinkTilt;
      ex += -tl*0.06*(sy - AN.faceC[1])*w.head;
      ey +=  tl*0.06*(sx - AN.faceC[0])*w.head;
      ex *= exprK; ey *= exprK;
    }
    ey += bob*w.head;

    /* repulsão + calor do mouse */
    if (mouse.on){
      const dx = sx - mouse.x, dy = sy - mouse.y;
      const d2 = dx*dx + dy*dy;
      if (d2 < 4900){
        const d = Math.sqrt(d2)||1, f = (1 - d/70)*14;
        p.ox += (dx/d)*f*dt*8; p.oy += (dy/d)*f*dt*8;
        p.heat = Math.min(1, p.heat + dt*4*(1-d/70) + mouse.vx*0.002);
      }
    }
    p.ox *= Math.exp(-dt*3.2); p.oy *= Math.exp(-dt*3.2);
    p.heat *= Math.exp(-dt*2.4);

    /* intro do caos + dispersão */
    let px = sx + wx + ex + p.ox, py = sy + wy + ey + p.oy;

    /* dispersão etílica: a matéria dela perde coesão com os copos —
       cada ponto flutua devagar para longe do lugar, mas os OLHOS
       resistem: o olhar segura firme enquanto o resto se desmancha */
    if (heatWarm > 0.01){
      const focus = 1 - Math.min(1, w.ir*1.4 + w.eye*0.9);
      const mag = heatWarm * (2.5 + 7*p.dr) * focus * exprK;
      px += Math.cos(p.ph3*9 + t*(0.12 + p.f3*0.11)) * mag;
      py += Math.sin(p.ph2*9 + t*(0.10 + p.f1*0.09)) * mag;
    }
    const ik = clamp((intro - p.d0*0.55)/0.45, 0, 1);
    const ie = 1 - Math.pow(1-ik, 5);
    const conv = ie*(1 - scatter);
    px = p.i0x*SW*1.4 - SW*0.2 + (px - (p.i0x*SW*1.4 - SW*0.2))*conv;
    py = p.i0y*SH*1.4 - SH*0.2 + (py - (p.i0y*SH*1.4 - SH*0.2))*conv;

    const rad = (a.r + (b.r-a.r)*mE) * scale * (1 + p.heat*0.35);
    const alpha = (a.a + (b.a-a.a)*mE) * (0.35+0.65*conv) + Math.sin(t*0.8+p.ph1)*0.07;
    if (alpha <= 0.02 || rad <= 0.05) continue;

    ctx.globalAlpha = clamp(alpha, 0, 1);
    if (p.heat > 0.06){
      const h = p.heat;
      ctx.fillStyle = `rgb(${Math.round(ink[0]+(emberC[0]-ink[0])*h)},${Math.round(ink[1]+(emberC[1]-ink[1])*h)},${Math.round(ink[2]+(emberC[2]-ink[2])*h)})`;
    } else if (ctx.fillStyle !== baseFill) ctx.fillStyle = baseFill;

    ctx.beginPath();
    ctx.arc(offX + px*scale, offY + py*scale, rad, 0, 6.2832);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  /* fallback de silêncio longo: retoma o raciocínio ou bebe sozinha */
  const now = t;
  if (!sipping && !thinking && talking===0 && now - lastUserAction > 90){
    lastUserAction = now;
    if (PA && history.some(m => m.role === 'assistant')) continueThinking();
    else {
      say(lvl(Math.min(copos+1, LEVELS.length-1)).idle);
      takeSip();
      setTimeout(()=> addSys(`bebeu sozinha · agora: ${lvl(copos).mood}`), 5300);
    }
  }
  requestAnimationFrame(frame);
}

/* ---------- voz da personagem ----------
   'blip' = voz de pontos (blueprint §12: assinatura sonora por estado)
   'tts'  = voz falada do navegador, embriagada junto com ela
   'off'  = muda                                                     */
let VOICE = 'blip', lastBlip = 0;
function voiceBlip(ch){
  if (VOICE !== 'blip' || !AC || AC.state !== 'running') return;
  if (!/[aeiouáéíóúâêôãõy]/i.test(ch)) return;      // só nas "vogais"
  const t = AC.currentTime;
  if (t - lastBlip < 0.055) return;
  lastBlip = t;
  const L = lvl(copos);
  const type = L.warm < 0.25 ? 'sine' : L.warm < 0.6 ? 'triangle' : 'sawtooth';
  const f = 285 + Math.random()*130 - L.warm*70;    // bêbada = voz mais grave
  note(f, t, 0.07 + L.warm*0.15 + Math.random()*0.04, type,
       type === 'sawtooth' ? 0.03 : 0.055);
}
let ttsVoice = null;
function pickVoice(){
  const vs = speechSynthesis.getVoices().filter(v => v.lang && v.lang.toLowerCase().indexOf('pt') === 0);
  ttsVoice = vs.find(v => /luciana|francisca|fernanda|maria|camila|vit|female/i.test(v.name)) || vs[0] || null;
}
if ('speechSynthesis' in window){
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}
function say(text){
  return new Promise(res => {
    const d = document.createElement('div');
    d.className = 'msg-a';
    speech.appendChild(d);
    let pend = 1;
    const done = () => { if (--pend === 0){ talking = 0; res(); } };
    talking = 1;
    if (VOICE === 'tts' && 'speechSynthesis' in window){
      pend++;
      const u = new SpeechSynthesisUtterance(text);
      if (ttsVoice) u.voice = ttsVoice;
      u.lang = 'pt-BR';
      const L = lvl(copos);
      u.rate  = 1.04 - L.warm*0.34;                 // arrasta com os copos
      u.pitch = 1.12 - L.warm*0.30 + (Math.random()-0.5)*0.08;
      u.onend = done; u.onerror = done;
      speechSynthesis.cancel();
      speechSynthesis.speak(u);
    }
    let i = 0;
    const iv = setInterval(() => {
      const step = 1 + (Math.random() < 0.3 ? 1 : 0);
      const chunk = text.slice(i, i + step);
      i += step;
      d.textContent = text.slice(0, i);
      voiceBlip(chunk.charAt(chunk.length - 1));
      speech.scrollTop = speech.scrollHeight;
      if (i >= text.length){ clearInterval(iv); done(); }
    }, 26);
  });
}

function systemPrompt(){
  const L = lvl(copos);
  return `Você é Lúpula, uma mulher feita de milhares de pontos de tinta, viva dentro de um canvas, sentada num bar cósmico tomando pilsner. Sua função: conversar sobre a ideia que a pessoa trouxer — dar insights, questionar, apontar o que é ótimo e o que é fraco. Você já tomou ${copos} copo(s) de pilsner. ${L.sys}
Regras: responda SEMPRE em português brasileiro, em fala corrida de 2 a 5 frases (máximo ~80 palavras), sem listas, sem markdown, sem asteriscos de ação. Trate a conversa inteira como a perseguição de UMA pergunta central implícita na ideia da pessoa; cada estado etílico muda o COMO você responde a ela, nunca o assunto. Nunca saia do personagem. Se a ideia descrita for suspeitamente parecida com você mesma (uma IA que bebe pilsner e discute ideias, mudando a cada copo), PERCEBA na hora e reaja com humor e vaidade ("peraí… essa ideia sou EU") antes de analisar.`;
}

/* histórico saneado: a API exige papéis alternados user/assistant */
function apiMessages(){
  const msgs = [];
  for (const m of history){
    if (msgs.length && msgs[msgs.length-1].role === m.role)
      msgs[msgs.length-1].content += '\n' + m.content;
    else msgs.push({role:m.role, content:m.content});
  }
  if (msgs.length && msgs[0].role !== 'user') msgs.shift();
  return msgs;
}

/* Detecta o ambiente: no Vercel usa o proxy /api/chat (chave protegida no
   servidor); dentro do claude.ai o proxy não existe e cai na API direta,
   que lá é autenticada automaticamente. */
let API_URL = null;
async function callAPI(){
  const candidates = API_URL ? [API_URL]
    : ['/api/chat', 'https://api.anthropic.com/v1/messages'];
  const erros = [];
  for (const url of candidates){
    try{
      const direct = url.indexOf('anthropic.com') >= 0;
      const body = direct
        ? { model:'claude-sonnet-4-6', max_tokens:1000,
            system:systemPrompt(), messages:apiMessages() }
        : { system:systemPrompt(), messages:apiMessages() };
      const r = await fetch(url, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify(body)
      });
      if (r.status === 404 || r.status === 405) throw new Error('proxy ausente');
      const data = await r.json();
      if (data.error) throw new Error(data.error.message || data.error.type || 'erro da API');
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const reply = (data.content||[]).filter(c=>c.type==='text').map(c=>c.text).join('\n').trim();
      if (!reply) throw new Error('resposta vazia');
      API_URL = url;                       // memoriza o endpoint que funcionou
      return reply;
    }catch(e){
      erros.push((url.indexOf('anthropic.com') >= 0 ? 'direta' : 'proxy') + ': ' + e.message);
    }
  }
  throw new Error(erros.join(' · '));
}

/* pipeline de geração reutilizável: sipAfter = ela bebe depois de opinar */
async function generate(sipAfter){
  thinking = true;
  sendBtn.disabled = true;
  const dots = document.createElement('div');
  dots.className = 'msg-sys'; dots.textContent = '· · ·';
  speech.appendChild(dots); speech.scrollTop = speech.scrollHeight;
  let reply = null, lastErr = null;
  for (let tentativa = 0; tentativa < 2 && !reply; tentativa++){
    try{ reply = await callAPI(); }
    catch(e){ lastErr = e; await new Promise(r => setTimeout(r, 900)); }
  }
  dots.remove();
  thinking = false;
  if (reply){
    history.push({role:'assistant', content:reply});
    await say(reply);
    if (sipAfter) setTimeout(() => {
      if (copos >= 6 && Math.random() < 0.35){
        addSys('ela trocou a cerveja por água');
        say('…água agora. mas não terminei o raciocínio, hein.').then(scheduleContinue);
        return;
      }
      takeSip();
      setTimeout(()=> {
        addSys(`*glup* · agora: ${lvl(copos).mood}`);
        scheduleContinue();            // 5s de silêncio → ela continua sozinha
      }, 5300);
    }, 700);
  } else {
    history.pop();   // remove o turno pendente para não corromper a conversa
    addSys('falha: ' + (lastErr && lastErr.message ? lastErr.message : 'desconhecida'));
    await say('…o garçom tropeçou com a bandeja. me conta de novo?');
  }
  sendBtn.disabled = false;
}

async function ask(text){
  addUser(text);
  history.push({role:'user', content:text});
  autoRuns = 0; waitingNote = false;   // sua fala renova o fôlego dela
  if (history.length > 14) history.splice(0, history.length-14);
  await generate(true);
}

/* silêncio: ela segue o raciocínio sozinha, gole após gole */
let autoRuns = 0, waitingNote = false;
const AUTO_PROMPT = '(A pessoa ficou em silêncio. Você tomou mais um gole. Continue respondendo a MESMA questão/ideia da conversa por conta própria: aprofunde um ponto, mude de ângulo ou teste o conceito — tudo sob seu estado atual de embriaguez. Não cumprimente, não peça resposta, não repita o que já disse.)';

function scheduleContinue(){
  setTimeout(() => {
    if (performance.now()/1000 - lastUserAction < 5) return;   // você falou: ela ouve
    if (thinking || sipping || talking !== 0) return;
    continueThinking();
  }, 5000);
}
function continueThinking(){
  if (!history.some(m => m.role === 'assistant')) return;
  if (autoRuns >= 4){
    if (!waitingNote){
      waitingNote = true;
      addSys('ela espera você agora');
      say('…já monologuei demais por uma rodada. sua vez: concorda ou discorda?');
    }
    return;
  }
  autoRuns++;
  history.push({role:'user', hidden:true, content: AUTO_PROMPT});
  if (history.length > 14) history.splice(0, history.length-14);
  generate(true);
}

function submit(){
  const v = inp.value.trim();
  if (!v || thinking || sipping) return;
  inp.value = '';
  lastUserAction = performance.now()/1000;
  ask(v);
}
sendBtn.addEventListener('click', submit);
inp.addEventListener('keydown', e => { if(e.key === 'Enter') submit(); });
brindeBtn.addEventListener('click', () => {
  if (sipping) return;
  lastUserAction = performance.now()/1000;
  addSys('você pediu mais uma 🍺');
  takeSip();
  setTimeout(()=> {
    addSys(`*glup* · agora: ${lvl(copos).mood}`);
    say(lvl(Math.min(copos, LEVELS.length-1)).idle);
  }, 5300);
});
document.getElementById('cafe').addEventListener('click', () => {
  if (sipping || copos === 0) return;
  lastUserAction = performance.now()/1000;
  copos = Math.max(0, copos - 2);
  updateHUD();
  addSys(`☕ café passado · volta para: ${lvl(copos).mood}`);
  const falas = copos === 0
    ? ['ugh… café. pronto: sóbria. pode falar, agora é análise pura.',
       'café puro, sem açúcar, sem ilusão. voltei. qual é a pauta?']
    : ['hmpf, café… tá, clareou um pouco. onde a gente estava?',
       'esse café tá forte… ok, dois copos a menos de opinião. continua.',
       'café num bar cósmico, que desperdício de lúpulo. mas tá, foco.'];
  say(falas[(Math.random()*falas.length)|0]);
});
/* ciclo de voz: pontos → falada → mudo */
const vozBtn = document.getElementById('voz');
vozBtn.addEventListener('click', () => {
  ensureAudio();
  if (VOICE === 'blip'){
    if ('speechSynthesis' in window){ VOICE = 'tts'; vozBtn.textContent = '🗣 falada'; }
    else { VOICE = 'off'; vozBtn.textContent = '🔇 mudo'; }
  }
  else if (VOICE === 'tts'){ VOICE = 'off'; vozBtn.textContent = '🔇 mudo';
    speechSynthesis.cancel(); }
  else { VOICE = 'blip'; vozBtn.textContent = '🔉 pontos'; }
});
/* salvar a conversa em PDF (imprimir → salvar como PDF) */
document.getElementById('pdf').addEventListener('click', () => {
  document.getElementById('printMeta').textContent =
    new Date().toLocaleString('pt-BR') + '  ·  ' + copos +
    (copos===1?' copo':' copos') + ' de pilsner  ·  estado final: ' + lvl(copos).mood;
  window.print();
});

async function greet(){
  await new Promise(r => setTimeout(r, 3200));
  await say('oi. eu sou a Lúpula — feita de pontos, movida a pilsner. me conta uma ideia sua: eu escuto, questiono e digo o que penso. e aviso: a cada copo… eu mudo um pouco.');
}
})();
</script>
